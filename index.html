<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CERP Project Dashboard</title>
<style>
  :root {
    --navy: #13577e;
    --teal: #069ba1;
    --teal-light: #e1f3f3;
    --cream: #f7f6f2;
    --ink: #1c2530;
    --muted: #5d6b78;
    --border: #dde3e6;
    --amber: #c97a2b;
    --amber-light: #fbf0e3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
  }
  header {
    background: var(--navy);
    color: white;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  header h1 {
    font-size: 20px;
    margin: 0;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  header .tagline {
    font-size: 12.5px;
    color: #a9c4cf;
    font-style: italic;
  }
  header .count {
    font-size: 13px;
    color: #c9dde2;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    min-height: calc(100vh - 68px);
  }
  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; }
  }

  .filters {
    background: white;
    border-right: 1px solid var(--border);
    padding: 20px 18px;
    position: sticky;
    top: 0;
    align-self: start;
    max-height: 100vh;
    overflow-y: auto;
  }
  .filters h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin: 18px 0 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }
  .filters h2:first-child { margin-top: 0; }
  .filter-group label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13.5px;
    padding: 4px 2px;
    cursor: pointer;
    color: var(--ink);
  }
  .filter-group label:hover { color: var(--teal); }
  .filter-group input[type="checkbox"] {
    accent-color: var(--teal);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }
  .filter-group .badge-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    background: var(--cream);
    border-radius: 8px;
    padding: 1px 6px;
  }
  .search-box {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13.5px;
    margin-bottom: 4px;
  }
  .search-box:focus { outline: 2px solid var(--teal); border-color: var(--teal); }
  .clear-btn {
    width: 100%;
    margin-top: 14px;
    padding: 8px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--muted);
    cursor: pointer;
  }
  .clear-btn:hover { background: var(--teal-light); color: var(--teal); }

  .main {
    padding: 22px 28px 60px;
  }
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .results-count {
    font-size: 13.5px;
    color: var(--muted);
  }
  .results-count strong { color: var(--ink); }
  .view-toggle {
    display: flex;
    gap: 6px;
    font-size: 12.5px;
  }
  .view-toggle button {
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 5px;
    cursor: pointer;
    color: var(--muted);
  }
  .view-toggle button.active {
    background: var(--teal);
    color: white;
    border-color: var(--teal);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .card:hover {
    box-shadow: 0 4px 14px rgba(12,47,79,0.10);
    transform: translateY(-1px);
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-area-pill {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .pill-Education { background: #e8eef7; color: #2b4a8c; }
  .pill-Health { background: var(--teal-light); color: var(--teal); }
  .pill-Gender---Inclusion { background: #f1e9f7; color: #6b3fa0; }
  .pill-Climate---Environment { background: #e6f0e8; color: #2f7a4f; }
  .pill-Governance { background: #fdeeea; color: #b5482f; }
  .pill-Social-Protection { background: #fef3e0; color: #a87311; }
  .pill-Economic-Opportunity { background: #e9f1fb; color: #1f5fa3; }

  .theme-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .status-pill {
    font-size: 10.5px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .status-Ongoing { background: #fff4d6; color: #92681a; }
  .status-Completed { background: #e3f3e6; color: #2c6e3f; }

  .card h3 {
    font-size: 15px;
    margin: 2px 0 0;
    color: var(--navy);
    line-height: 1.3;
  }
  .card .subtheme-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .subtheme-tag {
    font-size: 11px;
    color: var(--teal);
    font-weight: 600;
    background: var(--teal-light);
    padding: 1px 7px;
    border-radius: 8px;
  }
  .card p.desc {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.5;
    margin: 4px 0;
  }
  .card .partners {
    font-size: 11.5px;
    color: var(--muted);
    font-style: italic;
  }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
  }
  .tag {
    font-size: 10.5px;
    padding: 2px 7px;
    border-radius: 5px;
    border: 1px solid var(--border);
    color: var(--ink);
    background: var(--cream);
  }
  .tag.sl { background: var(--navy); color: white; border-color: var(--navy); }
  .tag.t2 { background: white; color: var(--teal); border-color: var(--teal); }
  .tag.t3 { background: white; color: var(--muted); font-style: italic; }

  .confidence-flag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    margin-top: 6px;
    width: fit-content;
  }
  .confidence-review { background: var(--amber-light); color: var(--amber); }
  .confidence-untagged { background: #f3eaea; color: #a13a3a; }
  .confidence-schema-flag { background: #ece4f5; color: #6b3fa0; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .copy-btn {
    align-self: flex-start;
    margin-top: 6px;
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--teal);
    color: var(--teal);
    background: white;
    border-radius: 5px;
    cursor: pointer;
  }
  .copy-btn:hover { background: var(--teal); color: white; }
  .copy-btn.copied { background: var(--teal); color: white; border-color: var(--teal); }

  /* ---------- About button + data banner ---------- */
  .about-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.35);
    color: white;
    font-size: 12.5px;
    padding: 7px 14px;
    border-radius: 7px;
    cursor: pointer;
    white-space: nowrap;
  }
  .about-btn:hover { background: rgba(255,255,255,0.22); }

  .data-banner {
    padding: 9px 28px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .data-banner.loading { background: var(--teal-light); color: var(--navy); }
  .data-banner.error { background: var(--amber-light); color: #8a3b1f; }

  .skeleton-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    height: 190px;
  }
  .skeleton-line {
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(90deg, var(--border) 25%, #eef1f2 37%, var(--border) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    margin-bottom: 10px;
  }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

  /* ---------- About modal ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20,30,38,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
  }
  .modal-overlay[hidden] { display: none; }
  .modal-card {
    background: var(--cream);
    border-radius: 14px;
    max-width: 760px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(10,30,45,0.35);
  }
  .modal-head {
    background: var(--navy);
    color: white;
    padding: 18px 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    border-radius: 14px 14px 0 0;
  }
  .modal-head h2 {
    margin: 0;
    font-size: 17px;
  }
  .modal-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
  }
  .modal-close:hover { background: rgba(255,255,255,0.3); }
  .modal-body { padding: 22px 26px 30px; }
  .modal-body p.lead {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.55;
    margin-top: 0;
  }
  .modal-section {
    margin-top: 22px;
  }
  .modal-section h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--navy);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin: 0 0 12px;
  }
  .breakdown-theme {
    margin-bottom: 14px;
  }
  .breakdown-theme-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .breakdown-theme-head .count-note {
    font-size: 11px;
    color: var(--muted);
  }
  .breakdown-subs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-left: 2px;
  }
  .sub-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    background: white;
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 7px;
    color: var(--ink);
  }
  .sub-chip .also-in {
    font-size: 9.5px;
    color: var(--muted);
    font-style: italic;
  }
  .glossary-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .glossary-item {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .glossary-item .term-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .glossary-item .term-name {
    font-weight: 700;
    font-size: 13.5px;
    color: var(--navy);
  }
  .glossary-item .term-meta {
    font-size: 11px;
    color: var(--muted);
  }
  .glossary-item .term-used-in {
    font-size: 11.5px;
    color: var(--teal);
    margin-top: 4px;
  }
  .modal-note {
    font-size: 12px;
    color: var(--muted);
    background: var(--teal-light);
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 4px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>CERP Project Dashboard</h1>
    <span class="tagline">Evidence Matters</span>
  </div>
  <div style="display:flex; align-items:center; gap:14px;">
    <button class="about-btn" id="aboutBtn" type="button">About this dashboard</button>
    <div class="count" id="headerCount"></div>
  </div>
</header>

<div class="data-banner" id="dataBanner" style="display:none;"></div>

<div class="layout">
  <aside class="filters">
    <h2>Search</h2>
    <input type="text" class="search-box" id="searchBox" placeholder="Search project name or description...">

    <h2>Theme</h2>
    <div class="filter-group" id="themeFilters"></div>

    <h2>Sub-theme</h2>
    <div class="filter-group" id="subthemeFilters"></div>

    <h2>Status</h2>
    <div class="filter-group" id="statusFilters"></div>

    <h2>Service Line</h2>
    <div class="filter-group" id="serviceLineFilters"></div>

    <h2>Method (Tier 2)</h2>
    <div class="filter-group" id="tier2Filters"></div>

    <h2>Technique (Tier 3)</h2>
    <div class="filter-group" id="tier3Filters"></div>

    <h2>Tagging Confidence</h2>
    <div class="filter-group" id="confidenceFilters"></div>

    <button class="clear-btn" id="clearBtn">Clear all filters</button>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div class="results-count"><strong id="resultsNum">0</strong> projects shown</div>
    </div>
    <div class="grid" id="cardGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      No projects match the current filters. Try clearing some filters.
    </div>
  </main>
</div>

<div class="modal-overlay" id="aboutModal" hidden>
  <div class="modal-card">
    <div class="modal-head">
      <h2>About this dashboard</h2>
      <button class="modal-close" id="modalCloseBtn" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- filled in by JS -->
    </div>
  </div>
</div>

<script src="sheet-loader.js"></script>
<script>
document.getElementById("aboutBtn").addEventListener("click", () => {
  document.getElementById("aboutModal").hidden = false;
});
document.getElementById("modalCloseBtn").addEventListener("click", () => {
  document.getElementById("aboutModal").hidden = true;
});
document.getElementById("aboutModal").addEventListener("click", (e) => {
  if (e.target.id === "aboutModal") document.getElementById("aboutModal").hidden = true;
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") document.getElementById("aboutModal").hidden = true;
});

// ---- Service line / method descriptions (static reference copy) ----
const SERVICE_LINE_DESC = {
  "Program Design & Implementation Support": "Helping a partner build or run a program well while it's happening — designing the rollout, supporting delivery, and course-correcting along the way.",
  "Evaluations": "Measuring whether a program worked, how it was implemented, or both — the largest body of work on the dashboard.",
  "Advanced Analytics": "Applying analytical techniques to data CERP or a partner already has, to answer a specific question or test a method.",
  "Decision Support Systems": "Building tools, dashboards, or ongoing data pipelines that help a partner make decisions on a continuing basis, not just a one-off study.",
  "Digital Transformations": "Helping an organization move a process onto digital infrastructure — tech-enabled monitoring, platforms, or systems."
};
const TIER2_DESC = {
  "Impact Evaluation": "Measures whether a program caused a change in outcomes, usually by comparing a treatment group to a control or comparison group.",
  "Process Evaluation": "Looks at how a program was implemented — fidelity, adoption, bottlenecks — rather than whether it changed outcomes.",
  "Applied Methods": "A broad bucket of analytical techniques (surveys, qualitative work, RCTs used for diagnostic rather than evaluative purposes) applied to a specific operational question.",
  "MLE": "Monitoring, Learning & Evaluation — ongoing tracking of a program paired with structured learning loops.",
  "Analytical Foundation": "Descriptive or exploratory analysis that lays the groundwork for later, more targeted work.",
  "Econometric Modeling": "Statistical modeling techniques used to estimate relationships or effects from existing data."
};
const TIER3_DESC = {
  "RCT": "Randomized Controlled Trial — participants are randomly assigned to treatment or control to isolate causal impact.",
  "Quasi-Experimental": "Compares treatment and comparison groups that weren't randomly assigned, using statistical techniques to approximate a controlled comparison.",
  "Longitudinal Study": "Follows the same people or units over an extended period to track change over time.",
  "Survey/Census": "Structured data collection from a sample (survey) or full population (census).",
  "Qualitative": "Interviews, focus groups, or observation aimed at understanding context, mechanisms, or lived experience.",
  "Descriptive Statistics": "Summarizing and describing patterns in existing data without testing a causal hypothesis.",
  "Mixed Methods": "Combines quantitative and qualitative techniques within a single study.",
  "Stepped Wedge": "A trial design where all participants eventually receive the intervention, but the order is randomized — useful when withholding treatment entirely isn't feasible.",
  "Experimental Design": "A controlled experimental setup used to isolate the effect of a specific variable, distinct from a field RCT."
};

function buildParentMap(parentField, childField) {
  // returns { childValue: Set(parentValues) }
  const m = {};
  PROJECTS.forEach(p => {
    (p[childField] || []).forEach(child => {
      if (!child) return;
      if (!m[child]) m[child] = new Set();
      (p[parentField] || []).forEach(parent => m[child].add(parent));
    });
  });
  return m;
}

function countProjectsFor(field, value) {
  return PROJECTS.filter(p => (p[field] || []).includes(value)).length;
}

function buildThemeBreakdown() {
  const subToThemes = buildParentMap("theme", "subtheme");
  const themes = unique("theme");

  // Decide one "primary" theme per subtheme: whichever theme has the most
  // projects carrying that subtheme (ties broken by alphabetical theme name
  // for stability). This is what "most associated with" means in practice.
  const primaryThemeForSub = {};
  Object.keys(subToThemes).forEach(sub => {
    const candidates = [...subToThemes[sub]];
    let best = null, bestCount = -1;
    candidates.sort().forEach(theme => {
      const count = PROJECTS.filter(p => p.theme.includes(theme) && p.subtheme.includes(sub)).length;
      if (count > bestCount) { bestCount = count; best = theme; }
    });
    primaryThemeForSub[sub] = best;
  });

  let html = "";
  themes.forEach(theme => {
    const subsHere = [...new Set(
      PROJECTS.filter(p => p.theme.includes(theme)).flatMap(p => p.subtheme)
    )]
      .filter(sub => primaryThemeForSub[sub] === theme) // only render where this IS the primary owner
      .sort();

    const projCount = countProjectsFor("theme", theme);
    html += `<div class="breakdown-theme">
      <div class="breakdown-theme-head">
        <span class="card-area-pill pill-${theme.replace(/ & /g," ").replace(/ /g,"-")}">${theme}</span>
        <span class="count-note">${projCount} project${projCount === 1 ? "" : "s"}</span>
      </div>`;

    if (subsHere.length) {
      html += `<div class="breakdown-subs">`;
      subsHere.forEach(sub => {
        const allOtherParents = [...subToThemes[sub]].filter(t => t !== theme);
        const alsoIn = allOtherParents.length
          ? `<span class="also-in">also: ${allOtherParents.join(", ")}</span>`
          : "";
        html += `<span class="sub-chip">${sub}${alsoIn}</span>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="breakdown-subs"><span class="count-note">No sub-themes tagged yet</span></div>`;
    }
    html += `</div>`;
  });
  return html;
}

function buildGlossarySection(values, descMap, field, parentField, parentLabel) {
  const parentMap = parentField ? buildParentMap(parentField, field) : null;
  let html = `<div class="glossary-list">`;
  values.forEach(val => {
    const count = countProjectsFor(field, val);
    const desc = descMap[val] || "No description on file yet.";
    let usedIn = "";
    if (parentMap && parentMap[val]) {
      usedIn = `<div class="term-used-in">Used under: ${[...parentMap[val]].join(", ")}</div>`;
    }
    html += `<div class="glossary-item">
      <div class="term-row">
        <span class="term-name">${val}</span>
        <span class="term-meta">${count} project${count === 1 ? "" : "s"}</span>
      </div>
      <p style="margin:6px 0 0; font-size:12.5px; color:var(--ink); line-height:1.5;">${desc}</p>
      ${usedIn}
    </div>`;
  });
  html += `</div>`;
  return html;
}

function buildAboutModalContent() {
  const body = document.getElementById("modalBody");

  const themeHTML = buildThemeBreakdown();
  const slHTML = buildGlossarySection(unique("serviceLine"), SERVICE_LINE_DESC, "serviceLine", null, null);
  const t2HTML = buildGlossarySection(unique("tier2"), TIER2_DESC, "tier2", "serviceLine", "Service Line");
  const t3HTML = buildGlossarySection(unique("tier3"), TIER3_DESC, "tier3", "tier2", "Method");

  body.innerHTML = `
    <p class="lead">This dashboard catalogs CERP's project portfolio. Every project is tagged along two independent dimensions: a <strong>subject-matter breakdown</strong> (Theme → Sub-theme) and a <strong>methodology breakdown</strong> (Service Line → Method → Technique). A project can carry more than one tag in each dimension, so some sub-themes and methods show up under more than one parent — those are listed once with a note on where else they appear, rather than repeated.</p>

    <div class="modal-section">
      <h3>Theme → Sub-theme</h3>
      ${themeHTML}
      <div class="modal-note">Sub-themes that apply to more than one theme are shown once, under the theme they're most associated with, with their other themes noted alongside.</div>
    </div>

    <div class="modal-section">
      <h3>Service Line</h3>
      ${slHTML}
    </div>

    <div class="modal-section">
      <h3>Method (Tier 2)</h3>
      ${t2HTML}
    </div>

    <div class="modal-section">
      <h3>Technique (Tier 3)</h3>
      ${t3HTML}
      <div class="modal-note">Methods and techniques are tagging dimensions, not a strict hierarchy — most methods are used across several service lines, which is why each entry above lists every service line it's been used under instead of nesting under just one.</div>
    </div>
  `;
}
</script>
<script>
let PROJECTS = [];

const state = {
  search: "",
  theme: new Set(),
  subtheme: new Set(),
  status: new Set(),
  serviceLine: new Set(),
  tier2: new Set(),
  tier3: new Set(),
  confidence: new Set()
};

function showSkeleton() {
  const grid = document.getElementById("cardGrid");
  const empty = document.getElementById("emptyState");
  empty.style.display = "none";
  let html = "";
  for (let i = 0; i < 6; i++) {
    html += `
      <div class="skeleton-card">
        <div class="skeleton-line" style="width:40%"></div>
        <div class="skeleton-line" style="width:80%"></div>
        <div class="skeleton-line" style="width:95%"></div>
        <div class="skeleton-line" style="width:90%"></div>
        <div class="skeleton-line" style="width:60%"></div>
      </div>`;
  }
  grid.innerHTML = html;
}

function showBanner(type, message) {
  const banner = document.getElementById("dataBanner");
  banner.className = "data-banner " + type;
  banner.textContent = message;
  banner.style.display = "block";
}

function hideBanner() {
  document.getElementById("dataBanner").style.display = "none";
}

function initDashboard() {
  buildFilterGroup("themeFilters", "theme", unique("theme"));
  buildFilterGroup("subthemeFilters", "subtheme", unique("subtheme"));
  buildFilterGroup("statusFilters", "status", unique("status"));
  buildFilterGroup("serviceLineFilters", "serviceLine", unique("serviceLine"));
  buildFilterGroup("tier2Filters", "tier2", unique("tier2"));
  buildFilterGroup("tier3Filters", "tier3", unique("tier3"));
  buildFilterGroup("confidenceFilters", "confidence", unique("confidence"));
  render();
  buildAboutModalContent();
}

showSkeleton();
showBanner("loading", "Loading the latest projects from the Google Sheet…");
loadProjectsFromSheet(
  (projects) => {
    PROJECTS = projects;
    hideBanner();
    initDashboard();
  },
  (err) => {
    showBanner("error", "Couldn't load live data (" + err.message + "). Showing nothing until this is fixed — check sheet-loader.js.");
    PROJECTS = [];
    document.getElementById("cardGrid").innerHTML = "";
    document.getElementById("resultsNum").textContent = "0";
    initDashboard();
  }
);


function pillClass(value) {
  // Convert "Gender & Inclusion" -> "Gender---Inclusion", "Climate & Environment" -> "Climate---Environment", "Economic Opportunity" -> "Economic-Opportunity"
  return value.replace(/ & /g, "---").replace(/ /g, "-");
}

function unique(field) {
  const s = new Set();
  PROJECTS.forEach(p => {
    const v = p[field];
    if (Array.isArray(v)) v.forEach(x => x && s.add(x));
    else if (v) s.add(v);
  });
  return [...s].sort();
}

function countFor(field, value) {
  return PROJECTS.filter(p => {
    const v = p[field];
    return Array.isArray(v) ? v.includes(value) : v === value;
  }).length;
}

const confidenceLabels = {
  confirmed: "Confirmed",
  review: "Needs review",
  untagged: "Untagged",
  "schema-flag": "Schema flag"
};

function buildFilterGroup(containerId, field, options) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  options.forEach(opt => {
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.value = opt;
    cb.addEventListener("change", () => {
      if (cb.checked) state[field].add(opt);
      else state[field].delete(opt);
      render();
    });
    const span = document.createElement("span");
    span.textContent = field === "confidence" ? (confidenceLabels[opt] || opt) : opt;
    const count = document.createElement("span");
    count.className = "badge-count";
    count.textContent = countFor(field, opt);
    label.appendChild(cb);
    label.appendChild(span);
    label.appendChild(count);
    container.appendChild(label);
  });
}

function matchesFilters(p) {
  if (state.search) {
    const q = state.search.toLowerCase();
    const hay = (p.name + " " + p.description + " " + p.partners + " " + p.subtheme.join(" ")).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  if (state.theme.size && !p.theme.some(t => state.theme.has(t))) return false;
  if (state.subtheme.size && !p.subtheme.some(s => state.subtheme.has(s))) return false;
  if (state.status.size && !state.status.has(p.status)) return false;
  if (state.serviceLine.size && !p.serviceLine.some(s => state.serviceLine.has(s))) return false;
  if (state.tier2.size && !p.tier2.some(s => state.tier2.has(s))) return false;
  if (state.tier3.size && !p.tier3.some(s => state.tier3.has(s))) return false;
  if (state.confidence.size && !state.confidence.has(p.confidence)) return false;
  return true;
}

function cardHTML(p) {
  const themePills = p.theme.map(t => `<span class="card-area-pill pill-${pillClass(t)}">${t}</span>`).join("");
  const subthemeTags = p.subtheme.map(s => `<span class="subtheme-tag">${s}</span>`).join("");
  const slTags = p.serviceLine.map(s => `<span class="tag sl">${s}</span>`).join("");
  const t2Tags = p.tier2.map(s => `<span class="tag t2">${s}</span>`).join("");
  const t3Tags = p.tier3.map(s => `<span class="tag t3">${s}</span>`).join("");
  const confBadge = p.confidence !== "confirmed"
    ? `<div class="confidence-flag confidence-${p.confidence}">${confidenceLabels[p.confidence]}</div>`
    : "";
  return `
    <div class="card" data-id="${p.id}">
      <div class="card-top">
        <div class="theme-row">${themePills}</div>
        <span class="status-pill status-${p.status}">${p.status}</span>
      </div>
      <h3>${p.name}</h3>
      <div class="subtheme-row">${subthemeTags}</div>
      <p class="desc">${p.description}</p>
      <div class="partners">${p.partners}</div>
      <div class="tag-row">${slTags}${t2Tags}${t3Tags}</div>
      ${confBadge}
      <button class="copy-btn" data-id="${p.id}">Copy card text</button>
    </div>
  `;
}

function render() {
  const filtered = PROJECTS.filter(matchesFilters);
  const grid = document.getElementById("cardGrid");
  const empty = document.getElementById("emptyState");
  document.getElementById("resultsNum").textContent = filtered.length;
  document.getElementById("headerCount").textContent = `${PROJECTS.length} total projects`;

  if (filtered.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    grid.innerHTML = filtered.map(cardHTML).join("");
  }

  document.querySelectorAll(".copy-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const p = PROJECTS.find(x => x.id === btn.dataset.id);
      const text = `${p.name}\n${p.partners}\n\n${p.description}`;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "Copied";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy card text"; btn.classList.remove("copied"); }, 1400);
      });
    });
  });
}

document.getElementById("searchBox").addEventListener("input", (e) => {
  state.search = e.target.value;
  render();
});

document.getElementById("clearBtn").addEventListener("click", () => {
  state.search = "";
  document.getElementById("searchBox").value = "";
  ["theme","subtheme","status","serviceLine","tier2","tier3","confidence"].forEach(f => state[f].clear());
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
  render();
});
</script>


</body>
</html>
